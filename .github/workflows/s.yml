name: 🛠️ One-Time Cloudflare Tunnel Generator

on:
  workflow_dispatch:

jobs:
  create-tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 🔑 Generate Tunnel Credentials
        run: |
          echo "🚀 Creating Named Tunnel..."
          # ক্লাউডফ্লেয়ার কুইক টানেল প্রোটোকল ব্যবহার করে রানার নিজের ভেতর একটি ফ্রি টানেল জেনারেট করবে
          cloudflared tunnel create gemini-gateway-secure
          
          # তৈরি হওয়া সিক্রেট ফাইলের পাথ
          CRED_PATH=$(ls ~/.cloudflared/*.json)
          
          echo "--------------------------------------------------------"
          echo "👇 COPY EVERYTHING BELOW THIS LINE 👇"
          cat "$CRED_PATH"
          echo "--------------------------------------------------------"
