name: 🚀 Gemini Persistent Profile API Gateway (Telegram Context Aware)

on:
  workflow_dispatch:

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent Playwright + Telegram Bridge
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install System & Node Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb virtual display started on :99"

      - name: 📂 Download & Extract Google Profile Securely
        env:
          DOWNLOAD_URL: ${{ secrets.PROFILE_DOWNLOAD_URL }}
        run: |
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ Error: PROFILE_DOWNLOAD_URL secret is missing!"
            exit 1
          fi
          wget -q -O gemini_profile.zip "$DOWNLOAD_URL"
          unzip -q gemini_profile.zip -d ./
          rm -f ./gemini_profile/SingletonLock ./gemini_profile/Lock ./gemini_profile/Google\ Profile\ Lock
          rm -rf ./gemini_profile/Default/Cache/*
          rm -f gemini_profile.zip
          echo "✅ Google Profile Loaded Successfully!"

      - name: 🛠️ Launch Gemini Telegram Bridge Engine
        run: |
          cat > telegram_bridge.mjs << 'TG_EOF'
          import fetch from 'node-fetch';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';
          import path from 'path';

          chromium.use(StealthPlugin());
          
          const TOKEN = "8012635061:AAGThMwyRZDVPmzZuvyr--kA2kZUjy87dE4";
          const CHAT_ID = "680349125";
          const TG_API = `https://api.telegram.org/bot${TOKEN}`;
          
          let context, page;

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function initGemini() {
            try {
              console.log("⚡ Launching Local Google Chrome Instance via Persistent Profile Folder...");
              context = await chromium.launchPersistentContext('./gemini_profile', {
                headless: false,
                channel: 'chrome',
                args: [
                  '--no-sandbox', '--disable-setuid-sandbox',
                  '--disable-dev-shm-usage',
                  '--disable-blink-features=AutomationControlled',
                  '--disable-web-security',
                  '--disable-features=IsolateOrigins,site-per-process'
                ]
              });

              page = await context.newPage();
              await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded', timeout: 40000 });
              
              console.log("✅ Gemini Browser Ready via Profile! Listening to Telegram Bot...");
              await sendTelegramMessage("🟢 Gemini Cloud Runner is Active & Ready with Context Memory!");
            } catch (err) { console.error("❌ Init failed:", err.message); process.exit(1); }
          }

          async function sendTelegramMessage(text) {
            await fetch(`${TG_API}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
          }

          async function processGeminiTask(promptText, localImagePath) {
            try {
              // চ্যাটবক্স অলরেডি ওপেন আছে কিনা এবং কোনো নোটিফিকেশন ওভারলে থাকলে তা ক্লিয়ার করা
              try { await page.keyboard.press('Escape'); await sleep(200); } catch (_) {}

              // ─── ইমেজ আপলোড মেথড (setInputFiles) ─────────────────────────────
              if (localImagePath && fs.existsSync(localImagePath)) {
                console.log(`📎 Uploading image: ${path.basename(localImagePath)}`);
                const uploadBtnSelectors = [
                  'button[aria-label="Open upload file menu"]',
                  'button[aria-label="Upload file"]',
                  'button[aria-label="Add image"]',
                  'button[aria-label="Attach files"]',
                ];

                let uploadBtnClicked = false;
                for (const sel of uploadBtnSelectors) {
                  try {
                    const btn = await page.$(sel);
                    if (btn) { await btn.click(); uploadBtnClicked = true; break; }
                  } catch (_) {}
                }

                if (uploadBtnClicked) {
                  const fileInput = await page.waitForSelector('input[type="file"]', { timeout: 5000 });
                  if (fileInput) {
                    await fileInput.setInputFiles(localImagePath);
                    console.log('    ✅ Image attached successfully via native input');
                    await sleep(1500);
                  }
                }
              }

              // ─── টেক্সট ইনপুট ও সাবমিট মেথড (একই সেশনে টাইপিং) ───────────────────
              console.log(`🌐 Injecting prompt into current session...`);
              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await page.waitForSelector(inputSel, { timeout: 15000 });
              await page.click(inputSel, { force: true });
              
              // পুরোনো আধখেচড়া টেক্সট থাকলে বক্স পরিষ্কার করে নেওয়া
              await page.keyboard.press('Control+a');
              await page.keyboard.press('Delete');
              await sleep(200);

              // আপনার অরিজিনাল ডম অবজেক্ট কাউন্টার (রানিং সেশনের জন্য মডিফাইড)
              const getResponseCount = () => page.evaluate(() => {
                const selectors = [
                  'div[id^="model-response-message-content"]',
                  'div[id^="response-message-content"]',
                  '.response-content-container',
                  'message-content',
                  'div.message-content'
                ];
                const seen = new Set();
                for (const sel of selectors) {
                  document.querySelectorAll(sel).forEach(el => seen.add(el));
                }
                return seen.size;
              }).catch(() => 0);

              const initialCount = await getResponseCount();

              await page.keyboard.insertText(promptText);
              await sleep(500);
              await page.keyboard.press('Enter');
              console.log(`    ⌨️ Submitted. Waiting for context response...`);

              // টেলিগ্রামে টাইপিং স্টেট পাঠানো
              const initialMsgRes = await fetch(`${TG_API}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: "✍️ Gemini is thinking..." })
              });
              const msgData = await initialMsgRes.json();
              const msgId = msgData.result.message_id;

              // ─── আপনার মেথডের ওল্ড ডম এক্সট্র্যাক্টর লুপ (একই সেশন ট্র্যাকিং ফিক্স) ───
              const deadline = Date.now() + 90000;
              let lastSentText = '';
              let stableCount = 0;
              let tgUpdateCounter = 0;

              while (Date.now() < deadline) {
                await sleep(1000);
                const currentCount = await getResponseCount();
                
                // যদি ডমে কোনো নতুন রেসপন্স নোড এখনও তৈরি না হয়, তবে অপেক্ষা করবে
                if (currentCount <= initialCount) continue;

                // ডমের একদম শেষের (Latest) প্যারাগ্রাফ অবজেক্ট স্ক্র্যাপ করবে
                const latestText = await page.evaluate(() => {
                  const selectors = [
                    'div[id^="model-response-message-content"]',
                    'div[id^="response-message-content"]',
                    '.response-content p',
                    'message-content',
                    'div.message-content'
                  ];
                  const allMatching = [];
                  for (const sel of selectors) {
                    document.querySelectorAll(sel).forEach(el => allMatching.push(el));
                  }
                  if (allMatching.length === 0) return '';
                  
                  // ডম অর্ডার অনুযায়ী সর্ট করে একদম শেষের এলিমেন্ট নেওয়া (যাতে ওল্ড মেসেজ সিঙ্ক না হয়)
                  allMatching.sort((a, b) => (a.compareDocumentPosition(b) & 4) ? -1 : 1);
                  const lastEl = allMatching[allMatching.length - 1];
                  return lastEl ? (lastEl.innerText || lastEl.textContent || '').trim() : '';
                }).catch(() => '');

                if (!latestText) continue;

                if (latestText.length > lastSentText.length) {
                  tgUpdateCounter++;
                  if (tgUpdateCounter % 2 === 0 || latestText.length - lastSentText.length > 40) {
                    await fetch(`${TG_API}/editMessageText`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ chat_id: CHAT_ID, message_id: msgId, text: latestText })
                    }).catch(() => {});
                    lastSentText = latestText;
                  }
                  stableCount = 0;
                } else if (latestText.length > 0 && latestText.length === lastSentText.length) {
                  stableCount++;
                  
                  const isFinished = await page.evaluate(() => {
                    const nodes = document.querySelectorAll('message-content, div[id^="model-response-message-content"]');
                    if (nodes.length === 0) return true;
                    // শুধুমাত্র লাস্ট নোডের লোডিং এনিমেশন চেক করা হচ্ছে
                    const lastNode = nodes[nodes.length - 1];
                    return lastNode ? (!lastNode.innerHTML.includes('loading') && !lastNode.innerHTML.includes('...')) : true;
                  }).catch(() => true);
                  
                  if (stableCount >= 2 && isFinished) { lastSentText = latestText; break; }
                }
              }

              // ফাইনাল সিঙ্ক পুশ
              await fetch(`${TG_API}/editMessageText`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, message_id: msgId, text: lastSentText })
              }).catch(() => {});
              console.log("✅ Live context message update complete!");

            } catch (err) {
              await sendTelegramMessage(`❌ Task Error: ${err.message}`);
            } finally {
              if (localImagePath && fs.existsSync(localImagePath)) fs.unlinkSync(localImagePath);
            }
          }

          async function startTelegramPolling() {
            await initGemini();
            let lastUpdateId = 0;

            while (true) {
              try {
                const res = await fetch(`${TG_API}/getUpdates?offset=${lastUpdateId + 1}&timeout=10`);
                const update = await res.json();
                
                if (update.result && update.result.length > 0) {
                  for (const msgObj of update.result) {
                    lastUpdateId = msgObj.update_id;
                    const message = msgObj.message;
                    
                    if (message && String(message.chat.id) === String(CHAT_ID)) {
                      let promptText = message.text || message.caption || "";
                      let localImagePath = null;
                      let fileId = null;

                      if (message.photo) {
                        fileId = message.photo[message.photo.length - 1].file_id;
                      } else if (message.document) {
                        const mime = message.document.mime_type || "";
                        if (mime.startsWith("image/")) {
                          fileId = message.document.file_id;
                        }
                      }

                      if (fileId) {
                        const fileRes = await fetch(`${TG_API}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        const filePath = fileData.result.file_path;
                        
                        const downloadUrl = `https://api.telegram.org/file/bot${TOKEN}/${filePath}`;
                        const imgRes = await fetch(downloadUrl);
                        const buffer = await imgRes.buffer();
                        
                        localImagePath = path.join(os.tmpdir(), `tg_upload_${Date.now()}.jpg`);
                        fs.writeFileSync(localImagePath, buffer);
                        console.log(`📥 Image successfully grabbed and stored on runner.`);
                      }

                      if (promptText && !promptText.startsWith('/start')) {
                        console.log(`🚀 Task Received: ${promptText.substring(0, 30)}...`);
                        await processGeminiTask(promptText, localImagePath);
                      }
                    }
                  }
                }
              } catch (e) { console.error("Polling error:", e.message); }
              await sleep(500);
            }
          }

          startTelegramPolling();
          TG_EOF

          node telegram_bridge.mjs
