name: 🚀 Gemini API Gateway via Cloudflare Tunnel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent Playwright API Server + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install Node Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 playwright express
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 3
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb started"

      - name: 📥 Install Cloudflare Tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          rm -f cloudflared.deb
          cloudflared --version
          echo "✅ cloudflared installed!"

      - name: 🎥 Start Screen Recording
        run: |
          mkdir -p /tmp/recordings /tmp/screenshots
          ffmpeg -f x11grab -r 10 -s 1920x1080 -i :99 \
            -vcodec libx264 -preset ultrafast -crf 30 \
            /tmp/recordings/session.mp4 > /tmp/ffmpeg.log 2>&1 &
          echo $! > /tmp/ffmpeg.pid
          echo "✅ Screen recording started"

      - name: 🛠️ Create Gemini API Server
        run: |
          cat > api_server.mjs << 'SERVER_EOF'
          import express from 'express';
          import { chromium } from 'playwright';
          import fs from 'fs';
          import os from 'os';
          import path from 'path';

          const app = express();
          app.use(express.json({ limit: '50mb' }));

          let context, page;
          const PORT = 3000;
          let screenshotCount = 0;

          const GMAIL_EMAIL = process.env.GMAIL_EMAIL || '';
          const GMAIL_APP_PASSWORD = process.env.GMAIL_APP_PASSWORD || '';

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function takeScreenshot(label) {
            try {
              const filename = `/tmp/screenshots/${String(screenshotCount++).padStart(3,'0')}_${label}.png`;
              await page.screenshot({ path: filename, fullPage: false });
              console.log(`    📸 ${filename}`);
            } catch (_) {}
          }

          async function getResponseCount() {
            return page.evaluate(() => {
              const selectors = [
                'div[id^="model-response-message-content"]',
                'message-content',
                'div.message-content',
                'model-response'
              ];
              let max = 0;
              for (const sel of selectors) {
                const count = document.querySelectorAll(sel).length;
                if (count > max) max = count;
              }
              return max;
            }).catch(() => 0);
          }

          async function getLastResponseText() {
            return page.evaluate(() => {
              const selectors = [
                'div[id^="model-response-message-content"]',
                'message-content',
                'div.message-content',
                'model-response'
              ];
              let allEls = [];
              for (const sel of selectors) {
                document.querySelectorAll(sel).forEach(el => allEls.push(el));
              }
              if (allEls.length === 0) return '';
              const lastEl = allEls[allEls.length - 1];
              return lastEl ? (lastEl.innerText || lastEl.textContent || '').trim() : '';
            }).catch(() => '');
          }

          async function dismissOverlays() {
            try { await page.keyboard.press('Escape'); await sleep(300); } catch (_) {}
            try { await page.keyboard.press('Escape'); await sleep(300); } catch (_) {}
            const dismissSels = [
              'button:has-text("Got it")',
              'button:has-text("Dismiss")',
              'button:has-text("Close")',
              'button:has-text("OK")',
              'button:has-text("I agree")',
              'button:has-text("Continue")',
              'button:has-text("Skip")',
              'button:has-text("Done")',
              'button:has-text("Not now")',
              '[aria-label="Close"]',
              '[aria-label="Dismiss"]',
              'mat-dialog-container button',
            ];
            for (const sel of dismissSels) {
              try {
                const btn = await page.$(sel);
                if (btn) {
                  await btn.click();
                  await sleep(400);
                  console.log(`    🚫 Dismissed: ${sel}`);
                }
              } catch (_) {}
            }
            try {
              const overlay = await page.$('.cdk-overlay-backdrop');
              if (overlay) { await overlay.click(); await sleep(400); }
            } catch (_) {}
          }

          async function googleLogin() {
            console.log('🔐 Starting Google auto-login...');

            await page.goto('https://accounts.google.com/signin', {
              waitUntil: 'domcontentloaded',
              timeout: 30000
            });
            await sleep(2000);
            await takeScreenshot('login_01_start');

            // Enter email
            try {
              await page.waitForSelector('input[type="email"]', { timeout: 10000 });
              await page.fill('input[type="email"]', GMAIL_EMAIL);
              await sleep(500);
              await takeScreenshot('login_02_email_filled');
              await page.keyboard.press('Enter');
              await sleep(2000);
              await takeScreenshot('login_03_after_email');
            } catch (e) {
              console.error('❌ Email field not found:', e.message);
              throw e;
            }

            // Enter password (app password - bypasses 2FA)
            try {
              await page.waitForSelector('input[type="password"]', { timeout: 10000 });
              await page.fill('input[type="password"]', GMAIL_APP_PASSWORD);
              await sleep(500);
              await takeScreenshot('login_04_password_filled');
              await page.keyboard.press('Enter');
              await sleep(3000);
              await takeScreenshot('login_05_after_password');
            } catch (e) {
              console.error('❌ Password field not found:', e.message);
              throw e;
            }

            // Handle any post-login prompts
            await dismissOverlays();
            await sleep(2000);
            await takeScreenshot('login_06_post_login');

            // Verify login success
            const currentUrl = page.url();
            console.log(`    🔍 Post-login URL: ${currentUrl}`);

            if (currentUrl.includes('accounts.google.com') &&
                currentUrl.includes('signin')) {
              await takeScreenshot('login_failed');
              throw new Error('Login failed - still on login page');
            }

            console.log('✅ Google login successful!');
          }

          async function saveImage(image_base64) {
            const buffer = Buffer.from(image_base64.replace(/^data:image\/\w+;base64,/, ""), 'base64');
            const mimeMatch = image_base64.match(/^data:([^;]+);base64,/);
            const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
            const ext = mime.split('/')[1]?.replace('jpeg', 'jpg') || 'jpg';
            const localImagePath = path.join(os.tmpdir(), `upload_${Date.now()}.${ext}`);
            fs.writeFileSync(localImagePath, buffer);
            return localImagePath;
          }

          async function uploadImage(localImagePath) {
            console.log(`    📎 Uploading: ${path.basename(localImagePath)}`);

            const btns = await page.evaluate(() =>
              [...document.querySelectorAll('button[aria-label]')]
                .map(b => b.getAttribute('aria-label'))
            ).catch(() => []);
            console.log(`    🔍 Buttons: ${JSON.stringify(btns)}`);
            await takeScreenshot('upload_01_before');

            const uploadBtnSelectors = [
              'button[aria-label="Upload & tools"]',
              'button[aria-label="Open upload file menu"]',
              'button[aria-label="Upload file"]',
              'button[aria-label="Add image"]',
              'button[aria-label="Attach files"]',
              'button[aria-label="Add files"]',
            ];

            let uploadClicked = false;
            for (const sel of uploadBtnSelectors) {
              try {
                const btn = await page.$(sel);
                if (btn) {
                  await btn.click();
                  console.log(`    🖱️ Clicked: ${sel}`);
                  await sleep(1500);
                  await takeScreenshot('upload_02_after_btn');
                  uploadClicked = true;
                  break;
                }
              } catch (_) {}
            }

            if (!uploadClicked) {
              uploadClicked = await page.evaluate(() => {
                const btn = [...document.querySelectorAll('button[aria-label]')].find(el => {
                  const label = (el.getAttribute('aria-label') || '').toLowerCase();
                  return label.includes('upload') || label.includes('attach') ||
                         label.includes('tools') || label.includes('add files') ||
                         label.includes('add image');
                });
                if (btn) { btn.click(); return true; }
                return false;
              }).catch(() => false);
              if (uploadClicked) {
                console.log('    🖱️ Clicked via partial match');
                await sleep(1500);
                await takeScreenshot('upload_02_partial');
              }
            }

            // Click submenu
            if (uploadClicked) {
              const submenuSelectors = [
                'button:has-text("Upload from computer")',
                'button:has-text("Upload from device")',
                'button:has-text("Upload image")',
                'button:has-text("Upload")',
                '[role="menuitem"]:has-text("Upload")',
                'li:has-text("Upload from computer")',
                'li:has-text("Upload")',
              ];
              for (const sel of submenuSelectors) {
                try {
                  const item = await page.$(sel);
                  if (item) {
                    await item.click();
                    console.log(`    🖱️ Submenu: ${sel}`);
                    await sleep(1000);
                    await takeScreenshot('upload_03_submenu');
                    break;
                  }
                } catch (_) {}
              }
            }

            // Strategy A: setInputFiles
            try {
              console.log('    🔄 Strategy A: setInputFiles...');
              const fileInput = await page.waitForSelector('input[type="file"]', { timeout: 8000 });
              if (fileInput) {
                await fileInput.setInputFiles(localImagePath);
                await sleep(3000);
                await takeScreenshot('upload_04_strategy_a_done');
                console.log('    ✅ Strategy A worked');
                return { success: true, strategy: 'Strategy A (setInputFiles)' };
              }
            } catch (e) {
              console.log(`    ❌ Strategy A failed: ${e.message}`);
              await takeScreenshot('upload_04_strategy_a_fail');
            }

            // Strategy B: filechooser
            try {
              console.log('    🔄 Strategy B: filechooser...');
              const [fileChooser] = await Promise.all([
                page.waitForEvent('filechooser', { timeout: 8000 }),
                (async () => {
                  for (const sel of uploadBtnSelectors) {
                    try {
                      const btn = await page.$(sel);
                      if (btn) { await btn.click(); await sleep(500); break; }
                    } catch (_) {}
                  }
                  await sleep(500);
                  for (const sel of [
                    'button:has-text("Upload from computer")',
                    'button:has-text("Upload from device")',
                    'button:has-text("Upload")',
                    'li:has-text("Upload")',
                  ]) {
                    try {
                      const item = await page.$(sel);
                      if (item) { await item.click(); break; }
                    } catch (_) {}
                  }
                })(),
              ]);
              await fileChooser.setFiles(localImagePath);
              await sleep(3000);
              await takeScreenshot('upload_04_strategy_b_done');
              console.log('    ✅ Strategy B worked');
              return { success: true, strategy: 'Strategy B (filechooser)' };
            } catch (e) {
              console.log(`    ❌ Strategy B failed: ${e.message}`);
              await takeScreenshot('upload_04_strategy_b_fail');
            }

            await takeScreenshot('upload_05_all_failed');
            return { success: false, strategy: 'none' };
          }

          async function initGemini() {
            console.log("⚡ Launching Chrome...");
            try {
              context = await chromium.launch({
                headless: false,
                channel: 'chrome',
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--disable-dev-shm-usage',
                  '--disable-blink-features=AutomationControlled',
                  '--disable-web-security',
                  '--window-size=1920,1080'
                ]
              });

              page = await context.newPage();
              await page.setViewportSize({ width: 1920, height: 1080 });
              await page.setExtraHTTPHeaders({ 'Accept-Language': 'en-US,en;q=0.9' });

              // Auto login with app password
              await googleLogin();

              // Navigate to Gemini
              console.log('🌐 Navigating to Gemini...');
              await page.goto('https://gemini.google.com/app', {
                waitUntil: 'domcontentloaded',
                timeout: 60000
              });
              await sleep(3000);
              await dismissOverlays();
              await takeScreenshot('00_gemini_ready');

              // Verify logged in
              const url = page.url();
              console.log(`    🔍 URL: ${url}`);
              if (url.includes('accounts.google.com')) {
                throw new Error('Not logged in after login attempt');
              }

              console.log("✅ Gemini Ready!");
            } catch (err) {
              console.error("❌ Failed to initialize:", err.message);
              process.exit(1);
            }
          }

          app.get('/health', (req, res) => {
            res.json({ status: 'ok', timestamp: new Date().toISOString() });
          });

          app.post('/api/gemini', async (req, res) => {
            const { prompt, image_base64 } = req.body;
            if (!prompt) return res.status(400).json({ error: "Prompt is required" });

            res.setHeader('Content-Type', 'text/event-stream');
            res.setHeader('Cache-Control', 'no-cache');
            res.setHeader('Connection', 'keep-alive');
            res.setHeader('Access-Control-Allow-Origin', '*');
            res.flushHeaders();

            const keepalive = setInterval(() => {
              try { res.write(': ping\n\n'); } catch (_) {}
            }, 15000);

            const send = (data) => res.write(`data: ${JSON.stringify(data)}\n\n`);

            let localImagePath = null;
            try {
              try { await page.keyboard.press('Escape'); await sleep(300); } catch (_) {}

              if (image_base64) {
                localImagePath = await saveImage(image_base64);
                send({ type: 'info', text: '📎 Uploading image to Gemini...' });
                const uploadResult = await uploadImage(localImagePath);
                if (!uploadResult.success) {
                  send({ type: 'error', error: '❌ Failed to upload image' });
                  clearInterval(keepalive);
                  res.end();
                  return;
                }
                send({ type: 'info', text: `✅ Image uploaded via: ${uploadResult.strategy}` });
              }

              await dismissOverlays();

              const prevCount = await getResponseCount();
              console.log(`📊 Previous response count: ${prevCount}`);

              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await page.waitForSelector(inputSel, { timeout: 20000 });
              await page.click(inputSel, { force: true });
              await sleep(200);
              await page.keyboard.press('Control+a');
              await page.keyboard.press('Delete');
              await sleep(300);
              await page.keyboard.insertText(prompt);
              await sleep(600);
              await takeScreenshot('prompt_before_submit');
              await page.keyboard.press('Enter');

              send({ type: 'start' });
              console.log(`📤 Prompt: ${prompt.substring(0, 50)}...`);

              const deadline = Date.now() + 180000;
              let newResponseAppeared = false;

              while (Date.now() < deadline) {
                await sleep(500);
                const currentCount = await getResponseCount();
                if (currentCount > prevCount) {
                  newResponseAppeared = true;
                  console.log(`✅ New response detected! Count: ${currentCount}`);
                  break;
                }
              }

              if (!newResponseAppeared) {
                await takeScreenshot('no_response');
                send({ type: 'error', error: 'No response from Gemini' });
                clearInterval(keepalive);
                res.end();
                return;
              }

              let lastSentText = '';
              let lastSeenText = '';
              let stableCount = 0;

              while (Date.now() < deadline) {
                await sleep(300);
                const latestText = await getLastResponseText();
                if (!latestText) continue;

                if (latestText.length > lastSentText.length) {
                  const delta = latestText.slice(lastSentText.length);
                  send({ type: 'delta', text: delta });
                  lastSentText = latestText;
                  lastSeenText = latestText;
                  stableCount = 0;
                } else if (latestText === lastSeenText) {
                  stableCount++;
                  if (stableCount >= 8) break;
                } else {
                  lastSeenText = latestText;
                  stableCount = 0;
                }
              }

              await takeScreenshot('response_complete');
              send({ type: 'done', full_response: lastSentText });
              console.log("✅ Response complete!");

            } catch (err) {
              console.error("❌ Error:", err.message);
              await takeScreenshot('error_state');
              send({ type: 'error', error: err.message });
            } finally {
              clearInterval(keepalive);
              res.end();
              if (localImagePath && fs.existsSync(localImagePath)) {
                try { fs.unlinkSync(localImagePath); } catch (_) {}
              }
            }
          });

          process.on('SIGINT', async () => {
            if (context) await context.close().catch(() => {});
            process.exit(0);
          });

          app.listen(PORT, '127.0.0.1', async () => {
            console.log(`🚀 Starting API Server on port ${PORT}...`);
            await initGemini();
            console.log(`🤖 API Server ready at http://127.0.0.1:${PORT}`);
          });
          SERVER_EOF
          echo "✅ API Server script created!"

      - name: 🌐 Start Tunnel & Publish URL to Central Repo
        env:
          DISPLAY: :99
          CENTRAL_REPO_TOKEN: ${{ secrets.CENTRAL_REPO_TOKEN }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "🌐 Starting Cloudflare Quick Tunnel..."
          cloudflared tunnel --url http://127.0.0.1:3000 \
            --no-autoupdate \
            --loglevel info \
            2>&1 | tee cloudflare.log &

          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            sleep 2
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.trycloudflare\.com' cloudflare.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            echo "⏳ Attempt $i/30..."
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            cat cloudflare.log
            exit 1
          fi

          echo "✅ Tunnel URL: $TUNNEL_URL"

          CENTRAL_REPO="jahid12525/gemini-url"
          FILE_PATH="tunnel_url.txt"
          API_URL="https://api.github.com/repos/$CENTRAL_REPO/contents/$FILE_PATH"

          API_RESPONSE=$(curl -s \
            -H "Authorization: token $CENTRAL_REPO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API_URL")

          SHA=$(echo "$API_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          echo "📋 SHA: $SHA"
          CONTENT=$(echo -n "$TUNNEL_URL" | base64 -w 0)

          if [ -n "$SHA" ]; then
            PAYLOAD="{\"message\":\"Update tunnel URL [skip ci]\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          else
            PAYLOAD="{\"message\":\"Create tunnel URL [skip ci]\",\"content\":\"${CONTENT}\"}"
          fi

          HTTP_STATUS=$(curl -s -o push_result.json -w "%{http_code}" -X PUT \
            -H "Authorization: token $CENTRAL_REPO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_URL")

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ tunnel_url.txt updated in central repo!"
          else
            echo "❌ Failed to update central repo (HTTP $HTTP_STATUS)"
            cat push_result.json
            exit 1
          fi

          echo "=============================================="
          echo "✅ CLOUDFLARE TUNNEL IS LIVE!"
          echo "🔗 PUBLIC URL  : $TUNNEL_URL"
          echo "📡 API Endpoint: $TUNNEL_URL/api/gemini"
          echo "❤️  Health Check: $TUNNEL_URL/health"
          echo "📌 FIXED URL   : https://raw.githubusercontent.com/$CENTRAL_REPO/main/$FILE_PATH"
          echo "=============================================="

          node api_server.mjs

      - name: 🛑 Stop Screen Recording
        if: always()
        run: |
          if [ -f /tmp/ffmpeg.pid ]; then
            kill $(cat /tmp/ffmpeg.pid) 2>/dev/null || true
            sleep 3
            echo "✅ Recording stopped"
          fi

      - name: 📸 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/screenshots/
          if-no-files-found: warn
          retention-days: 3

      - name: 🎥 Upload Screen Recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screen-recording
          path: /tmp/recordings/
          if-no-files-found: warn
          retention-days: 3
