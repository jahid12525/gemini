name: 🚀 Gemini Persistent Profile API Gateway (Telegram Turbo Original Method)

on:
  workflow_dispatch:
    inputs:
      gemini_session:
        description: "🌐 Gemini Web Session JSON (paste storageState JSON)"
        required: false
        default: ""

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent Playwright + Telegram Bridge
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install System & Node Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb virtual display started on :99"

      - name: 🛠️ Launch Gemini Telegram Bridge Engine
        env:
          GEMINI_SESSION: ${{ secrets.GEMINI_SESSION }}
          GEMINI_SESSION_INPUT: ${{ github.event.inputs.gemini_session }}
        run: |
          cat > telegram_bridge.mjs << 'TG_EOF'
          import fetch from 'node-fetch';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';
          import path from 'path';

          chromium.use(StealthPlugin());
          
          const TOKEN = "8012635061:AAGThMwyRZDVPmzZuvyr--kA2kZUjy87dE4";
          const CHAT_ID = "680349125";
          const TG_API = `https://api.telegram.org/bot${TOKEN}`;
          
          const GEMINI_SESSION_RAW = (process.env.GEMINI_SESSION_INPUT?.trim() || process.env.GEMINI_SESSION || '').trim();
          
          if (!GEMINI_SESSION_RAW) {
            console.error('❌ Error: GEMINI_SESSION secret or input is missing.');
            process.exit(1);
          }

          // ─── COOKIE NORMALIZER (আপনার অরিজিনাল মেথড) ──────────────────────────────
          function normalizeCookies(rawCookies) {
            return rawCookies.map(c => {
              let sameSite = 'None';
              if (c.sameSite) {
                const ss = c.sameSite.toLowerCase();
                if (ss === 'lax')                               sameSite = 'Lax';
                else if (ss === 'strict')                       sameSite = 'Strict';
                else if (ss === 'none' || ss === 'no_restriction') sameSite = 'None';
              }
              const expires = c.expires   !== undefined ? Math.floor(c.expires) :
                              c.expirationDate !== undefined ? Math.floor(c.expirationDate) :
                              -1;
              return {
                name:     c.name,
                value:    c.value,
                domain:   c.domain,
                path:     c.path || '/',
                expires,
                httpOnly: !!c.httpOnly,
                secure:   !!c.secure,
                sameSite,
              };
            });
          }

          let parsed = JSON.parse(GEMINI_SESSION_RAW);
          let GEMINI_STORAGE_STATE = {
            cookies: normalizeCookies(parsed.cookies || parsed),
            origins: Array.isArray(parsed.origins) ? parsed.origins : []
          };

          const STORAGE_STATE_FILE = path.join(os.tmpdir(), 'gemini_storage_state.json');
          fs.writeFileSync(STORAGE_STATE_FILE, JSON.stringify(GEMINI_STORAGE_STATE, null, 2));

          let context, page;

          async function initGemini() {
            try {
              console.log("⚡ Launching Local Google Chrome Instance using StorageState...");
              context = await chromium.launchPersistentContext('./gemini_profile', {
                headless: false,
                channel: 'chrome',
                args: [
                  '--no-sandbox', '--disable-setuid-sandbox',
                  '--disable-dev-shm-usage',
                  '--disable-blink-features=AutomationControlled',
                  '--disable-web-security',
                  '--disable-features=IsolateOrigins,site-per-process'
                ]
              });
              
              // আপনার মেথড অনুযায়ী স্টোরেজ স্টেট ফাইল লোড করা
              await context.setStorageState({ path: STORAGE_STATE_FILE });

              page = await context.newPage();
              await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded', timeout: 30000 });
              
              console.log("✅ Gemini Browser Ready! Listening to Telegram Bot...");
              await sendTelegramMessage("🟢 Gemini Cloud Runner is Active & Ready!");
            } catch (err) { console.error("❌ Init failed:", err.message); process.exit(1); }
          }

          async function sendTelegramMessage(text) {
            await fetch(`${TG_API}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
          }

          async function processGeminiTask(promptText, localImagePath) {
            try {
              console.log('🌐 Opening fresh Gemini chat session...');
              await page.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded', timeout: 30000 });
              await new Promise(r => setTimeout(r, 3000));

              try { await page.keyboard.press('Escape'); } catch(_) {}

              // ─── আপনার ইমেজ আপলোড মেথড (setInputFiles) ─────────────────────────────
              if (localImagePath && fs.existsSync(localImagePath)) {
                console.log(`📎 Uploading image: ${path.basename(localImagePath)}`);
                const uploadBtnSelectors = [
                  'button[aria-label="Open upload file menu"]',
                  'button[aria-label="Upload file"]',
                  'button[aria-label="Add image"]',
                  'button[aria-label="Attach files"]',
                ];

                let uploadBtnClicked = false;
                for (const sel of uploadBtnSelectors) {
                  try {
                    const btn = await page.$(sel);
                    if (btn) { await btn.click(); uploadBtnClicked = true; break; }
                  } catch (_) {}
                }

                if (uploadBtnClicked) {
                  const fileInput = await page.waitForSelector('input[type="file"]', { timeout: 5000 });
                  if (fileInput) {
                    await fileInput.setInputFiles(localImagePath);
                    console.log('    ✅ Image attached successfully via native input');
                    await new Promise(r => setTimeout(r, 1500));
                  }
                }
              }

              // ─── আপনার টেক্সট ইনপুট ও সাবমিট মেথড ──────────────────────────────
              console.log(`🌐 Sending prompt...`);
              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await page.waitForSelector(inputSel, { timeout: 15000 });
              await page.click(inputSel, { force: true });
              await page.keyboard.press('Control+a');
              await page.keyboard.press('Delete');
              await new Promise(r => setTimeout(r, 200));

              await page.keyboard.insertText(promptText);
              await new Promise(r => setTimeout(r, 500));
              await page.keyboard.press('Enter');
              console.log(`    ⌨️ Submitted via Enter key`);

              // ─── রেসপন্স ট্র্যাকিং লজিক ──────────────────────────────────────────
              const responseSel = 'div[id^="model-response-message-content"], message-content, .message-content-inner';
              await page.waitForSelector(responseSel, { timeout: 15000 });

              const initialMsgRes = await fetch(`${TG_API}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: "✍️ Gemini is typing..." })
              });
              const msgData = await initialMsgRes.json();
              const msgId = msgData.result.message_id;

              let lastSentText = "";
              let stableCount = 0;

              while (true) {
                await new Promise(r => setTimeout(r, 1000));
                const currentFullText = await page.evaluate((selector) => {
                  const el = document.querySelector(selector);
                  return el ? el.innerText.trim() : '';
                }, responseSel);

                if (currentFullText.length > lastSentText.length) {
                  await fetch(`${TG_API}/editMessageText`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, message_id: msgId, text: currentFullText })
                  }).catch(() => {});
                  lastSentText = currentFullText;
                  stableCount = 0;
                } else if (currentFullText.length > 0 && currentFullText.length === lastSentText.length) {
                  stableCount++;
                  const isFinished = await page.evaluate((selector) => {
                    const el = document.querySelector(selector);
                    return el ? (!el.innerHTML.includes('loading') && !el.innerHTML.includes('...')) : true;
                  }, responseSel);
                  if (stableCount >= 2 && isFinished) break;
                }
              }

              // ফাইনাল রেসপন্স পুশ
              await fetch(`${TG_API}/editMessageText`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, message_id: msgId, text: lastSentText })
              }).catch(() => {});

            } catch (err) {
              await sendTelegramMessage(`❌ Task Error: ${err.message}`);
            } finally {
              if (localImagePath && fs.existsSync(localImagePath)) fs.unlinkSync(localImagePath);
            }
          }

          async function startTelegramPolling() {
            await initGemini();
            let lastUpdateId = 0;

            while (true) {
              try {
                const res = await fetch(`${TG_API}/getUpdates?offset=${lastUpdateId + 1}&timeout=10`);
                const update = await res.json();
                
                if (update.result && update.result.length > 0) {
                  for (const msgObj of update.result) {
                    lastUpdateId = msgObj.update_id;
                    const message = msgObj.message;
                    
                    if (message && String(message.chat.id) === String(CHAT_ID)) {
                      let promptText = message.text || message.caption || "";
                      let localImagePath = null;

                      if (message.photo) {
                        const fileId = message.photo[message.photo.length - 1].file_id;
                        const fileRes = await fetch(`${TG_API}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        const filePath = fileData.result.file_path;
                        
                        const downloadUrl = `https://api.telegram.org/file/bot${TOKEN}/${filePath}`;
                        const imgRes = await fetch(downloadUrl);
                        const buffer = await imgRes.buffer();
                        
                        localImagePath = path.join(os.tmpdir(), `tg_upload_${Date.now()}.jpg`);
                        fs.writeFileSync(localImagePath, buffer);
                      }

                      if (promptText && !promptText.startsWith('/start')) {
                        console.log(`🚀 Task Received via Telegram: ${promptText.substring(0, 30)}...`);
                        await processGeminiTask(promptText, localImagePath);
                      }
                    }
                  }
                }
              } catch (e) { console.error("Polling error:", e.message); }
              await new Promise(r => setTimeout(r, 500));
            }
          }

          startTelegramPolling();
          TG_EOF

          node telegram_bridge.mjs
