name: 🚀 Gemini Persistent Profile API Gateway

on:
  workflow_dispatch:

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent API + LocalTunnel
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install System & Node Dependencies
        run: |
          npm init -y
          npm install express playwright playwright-extra puppeteer-extra-plugin-stealth localtunnel multer
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: 📂 Download & Extract Google Profile Securely
        env:
          DOWNLOAD_URL: ${{ secrets.PROFILE_DOWNLOAD_URL }}
        run: |
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ Error: PROFILE_DOWNLOAD_URL secret is missing!"
            exit 1
          fi
          
          echo "📥 Downloading profile from secure cloud link..."
          wget -q -O gemini_profile.zip "$DOWNLOAD_URL"
          
          if [ -s "gemini_profile.zip" ]; then
            unzip -q gemini_profile.zip -d ./
            echo "🧹 Cleaning Windows specific lock files from profile..."
            rm -f ./gemini_profile/SingletonLock
            rm -f ./gemini_profile/Lock
            rm -f ./gemini_profile/Google\ Profile\ Lock
            rm -rf ./gemini_profile/Default/Cache/*
            rm -f gemini_profile.zip
            echo "✅ Secure Profile directory is ready!"
          else
            echo "❌ Error: Failed to download gemini_profile.zip!"
            exit 1
          fi

      - name: 🛠️ Create & Start API Gateway Server
        run: |
          mkdir -p /tmp/gemini-recordings

          cat > server.mjs << 'SERVER_EOF'
          import express from 'express';
          import multer from 'multer';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';

          chromium.use(StealthPlugin());
          const app = express();
          const upload = multer({ dest: os.tmpdir() });
          app.use(express.json());

          const PORT = 8080;
          let context, page;

          async function initGemini() {
            try {
              console.log("⚡ [CONSOLE UPDATE] Launching Local Google Chrome Instance...");
              context = await chromium.launchPersistentContext('./gemini_profile', {
                headless: false,
                channel: 'chrome',
                args: [
                  '--no-sandbox', 
                  '--disable-setuid-sandbox',
                  '--disable-blink-features=AutomationControlled',
                  '--disable-web-security',
                  '--disable-gpu'
                ],
                viewport: { width: 1280, height: 800 },
                recordVideo: {
                  dir: '/tmp/gemini-recordings/',
                  size: { width: 1280, height: 800 }
                }
              });

              page = await context.newPage();
              await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded' });
              console.log("✅ [CONSOLE UPDATE] Gemini Browser Ready!");
            } catch (err) {
              console.error("❌ [CRITICAL ERROR] Init failed:", err.message);
            }
          }

          app.post('/api/gemini', upload.single('image'), async (req, res) => {
            if (!page) return res.status(500).json({ success: false, error: 'Browser stack not ready' });
            
            const promptText = req.body.prompt;
            const file = req.file;
            if (!promptText) return res.status(400).json({ error: 'Prompt is required' });

            try {
              console.log(`🤖 [API] New Request received.`);
              await page.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded' });
              try { await page.keyboard.press('Escape'); } catch(_) {}

              if (file) {
                const inputFiles = await page.waitForSelector('input[type="file"]');
                await inputFiles.setInputFiles(file.path);
                fs.unlinkSync(file.path);
              }

              const inputSel = 'div.ql-editor[contenteditable="true"], div[role="textbox"], textarea';
              await page.waitForSelector(inputSel);
              await page.click(inputSel, { force: true });
              await page.keyboard.insertText(promptText);
              await page.keyboard.press('Enter');

              const responseSel = 'div[id^="model-response-message-content"], message-content, .message-content-inner';
              await page.waitForSelector(responseSel);

              // HTTP স্ট্রিমিং রেসপন্স হেডার সেটআপ
              res.setHeader('Content-Type', 'text/event-stream');
              res.setHeader('Cache-Control', 'no-cache');
              res.setHeader('Connection', 'keep-alive');

              let lastSentText = "";
              let noChangeCounter = 0;

              // মিউটেশন বা পোলিং এর মাধ্যমে ডমের লাইভ ক্যারেক্টার ট্র্যাক লুপ (জিরো এক্সট্রা ডিলে)
              while (true) {
                await new Promise(r => setTimeout(r, 200)); // ২০০ মিলি-সেকেন্ড পর পর ডম থেকে নতুন ক্যারেক্টার পিক করবে
                
                const currentFullText = await page.evaluate((selector) => {
                  const el = document.querySelector(selector);
                  return el ? el.innerText.trim() : '';
                }, responseSel);

                if (currentFullText.length > lastSentText.length) {
                  // শুধুমাত্র নতুন অংশটুকু (শব্দ বা ক্যারেক্টার) কেটে ক্লায়েন্টকে লাইভ পাঠানো হচ্ছে
                  const newChunk = currentFullText.substring(lastSentText.length);
                  res.write(newChunk);
                  lastSentText = currentFullText;
                  noChangeCounter = 0;
                } else if (currentFullText.length > 0 && currentFullText.length === lastSentText.length) {
                  noChangeCounter++;
                  
                  // জেমিনির জেনারেশন শেষ কিনা তা যাচাই করার কন্ডিশন
                  const isFinished = await page.evaluate((selector) => {
                    const el = document.querySelector(selector);
                    if (!el) return true;
                    return !el.innerHTML.includes('loading') && !el.innerHTML.includes('...');
                  }, responseSel);

                  if (noChangeCounter > 5 && isFinished) {
                    break;
                  }
                }
              }

              res.end(); // স্ট্রিমিং শেষ
              console.log(`✅ [API] Realtime Stream Complete!`);
            } catch (err) {
              console.error(`❌ [API ERROR]`, err.message);
              if (!res.headersSent) {
                res.status(500).json({ success: false, error: err.message });
              } else {
                res.end();
              }
            }
          });

          app.listen(PORT, '0.0.0.0', async () => {
            console.log(`🚀 API Internal Server running on port ${PORT}`);
            await initGemini();
          });
          SERVER_EOF

          node server.mjs &
          sleep 5

      - name: 🔗 Bind & Expose via LocalTunnel Gateway
        run: |
          echo "🔗 Connecting LocalTunnel Gateway..."
          sudo npm install -g localtunnel
          lt --port 8080 --subdomain ruslan-gemini-api &
          sleep 18000

      - name: 🎥 Upload Live Screen Recording & Debug Assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-live-recording
          path: /tmp/gemini-recordings/
          retention-days: 3
