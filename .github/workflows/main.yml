name: 🚀 Gemini Persistent Profile API Gateway

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent API + LocalTunnel
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install System & Node Dependencies
        run: |
          npm init -y
          npm install express playwright-extra puppeteer-extra-plugin-stealth localtunnel multer
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: 📂 Extract Persistent Google Profile
        run: |
          if [ -f "gemini_profile.zip" ]; then
            unzip -q gemini_profile.zip -d ./
            ls -la ./gemini_profile
          else
            echo "❌ Error: gemini_profile.zip not found in repository root!"
            exit 1
          fi

      - name: 🛠️ Create & Start API Gateway Server
        run: |
          cat > server.mjs << 'SERVER_EOF'
          import express from 'express';
          import multer from 'multer';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';

          chromium.use(StealthPlugin());
          const app = express();
          const upload = multer({ dest: os.tmpdir() });
          app.use(express.json());

          const PORT = 8080;
          let context, page;

          async function initGemini() {
            console.log("🌐 Launching Chromium with Persistent Context...");
            
            context = await chromium.launchPersistentContext('./gemini_profile', {
              headless: false,
              channel: 'chrome',
              args: [
                '--no-sandbox', 
                '--disable-setuid-sandbox',
                '--disable-blink-features=AutomationControlled',
                '--disable-web-security'
              ],
              viewport: { width: 1280, height: 800 }
            });

            page = await context.newPage();
            
            console.log("🔐 Checking Gemini Live Session Status...");
            await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded', timeout: 50000 });
            await new Promise(r => setTimeout(r, 5000));
            
            console.log(`Current Connected URL: ${page.url()}`);
            console.log("✅ Gemini Persistent Browser Stack Ready!");
          }

          app.post('/api/gemini', upload.single('image'), async (req, res) => {
            const promptText = req.body.prompt;
            const file = req.file;

            if (!promptText) return res.status(400).json({ error: 'Prompt is required' });

            try {
              console.log(`🤖 Request Received: ${promptText}`);
              await page.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded' });
              await new Promise(r => setTimeout(r, 2000));
              try { await page.keyboard.press('Escape'); } catch(_) {}

              if (file) {
                console.log(`📎 Uploading Image Asset to Gemini input...`);
                const inputFiles = await page.waitForSelector('input[type="file"]', { timeout: 5000 });
                await inputFiles.setInputFiles(file.path);
                await new Promise(r => setTimeout(r, 2000));
                fs.unlinkSync(file.path);
              }

              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await page.click(inputSel, { force: true });
              await page.keyboard.insertText(promptText);
              await page.keyboard.press('Enter');

              let responseText = '';
              const deadline = Date.now() + 75000;
              while (Date.now() < deadline) {
                await new Promise(r => setTimeout(r, 2500));
                responseText = await page.evaluate(() => {
                  const el = document.querySelector('div[id^="model-response-message-content"], message-content');
                  return el ? el.innerText.trim() : '';
                });
                if (responseText && !responseText.includes('...')) break;
              }

              res.json({ success: true, response: responseText });
            } catch (err) {
              res.status(500).json({ success: false, error: err.message });
            }
          });

          app.listen(PORT, async () => {
            console.log(`🚀 API Internal Server running on port ${PORT}`);
            await initGemini();
          });
          SERVER_EOF

          node server.mjs &
          sleep 8

      - name: 🔗 Bind & Expose via LocalTunnel Gateway
        run: |
          echo "🔗 Connecting LocalTunnel Gateway..."
          sudo npm install -g localtunnel
          
          lt --port 8080 --subdomain ruslan-gemini-api &
          
          echo "⏰ Active Shift Started. Listening for API cURL calls..."
          sleep 18000
          echo "🛑 Shift ended. Transferring gateway pointer to next account."
