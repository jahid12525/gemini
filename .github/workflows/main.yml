name: 🚀 Gemini API Gateway via ngrok (Ubuntu 24.04 Fixed)

on:
  workflow_dispatch:

jobs:
  run-api-gateway:
    name: 🌐 Launch Persistent Playwright API Server + ngrok Tunnel
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📥 Install Node Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 playwright playwright-extra puppeteer-extra-plugin-stealth express
          npx playwright install chrome --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb virtual display started on :99"

      - name: 📂 Download & Extract Google Profile Securely
        env:
          DOWNLOAD_URL: ${{ secrets.PROFILE_DOWNLOAD_URL }}
        run: |
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ Error: PROFILE_DOWNLOAD_URL secret is missing!"
            exit 1
          fi
          wget -q -O gemini_profile.zip "$DOWNLOAD_URL"
          unzip -q gemini_profile.zip -d ./
          rm -f ./gemini_profile/SingletonLock ./gemini_profile/Lock ./gemini_profile/Google\ Profile\ Lock
          rm -rf ./gemini_profile/Default/Cache/*
          rm -f gemini_profile.zip
          echo "✅ Google Profile Loaded Successfully!"

      - name: 🛠️ Launch Gemini API Engine & Start ngrok Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          cat > api_server.mjs << 'SERVER_EOF'
          import express from 'express';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';
          import path from 'path';

          chromium.use(StealthPlugin());
          
          const app = express();
          app.use(express.json({ limit: '50mb' }));
          
          let context, page;
          const PORT = 3000;

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function initGemini() {
            console.log("⚡ Launching Local Google Chrome Instance...");
            context = await chromium.launchPersistentContext('./gemini_profile', {
              headless: false,
              channel: 'chrome',
              args: [
                '--no-sandbox', '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled',
                '--disable-web-security',
                '--disable-features=IsolateOrigins,site-per-process'
              ]
            });
            page = await context.newPage();
            await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded', timeout: 40000 });
            console.log("✅ Gemini Web Interface Is Active inside Runner!");
          }

          app.post('/api/gemini', async (req, res) => {
            const { prompt, image_base64 } = req.body;
            if (!prompt) return res.status(400).json({ error: "Prompt is required" });

            console.log(`📩 New Request Received! Prompt: ${prompt.substring(0, 30)}...`);
            let localImagePath = null;

            try {
              try { await page.keyboard.press('Escape'); } catch (_) {}

              if (image_base64) {
                const buffer = Buffer.from(image_base64.replace(/^data:image\/\w+;base64,/, ""), 'base64');
                localImagePath = path.join(os.tmpdir(), `upload_${Date.now()}.jpg`);
                fs.writeFileSync(localImagePath, buffer);

                const uploadBtnSelectors = [
                  'button[aria-label="Open upload file menu"]',
                  'button[aria-label="Upload file"]',
                  'button[aria-label="Add image"]',
                  'button[aria-label="Attach files"]',
                ];

                let uploadBtnClicked = false;
                for (const sel of uploadBtnSelectors) {
                  try { const btn = await page.$(sel); if (btn) { await btn.click(); uploadBtnClicked = true; break; } } catch (_) {}
                }

                if (uploadBtnClicked) {
                  const fileInput = await page.waitForSelector('input[type="file"]', { timeout: 5000 });
                  if (fileInput) {
                    await fileInput.setInputFiles(localImagePath);
                    await sleep(1500);
                  }
                }
              }

              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await page.waitForSelector(inputSel, { timeout: 15000 });
              await page.click(inputSel, { force: true });
              await page.keyboard.press('Control+a');
              await page.keyboard.press('Delete');
              await sleep(200);

              const getResponseCount = () => page.evaluate(() => {
                return document.querySelectorAll('div[id^="model-response-message-content"], message-content, div.message-content').length;
              }).catch(() => 0);

              await page.keyboard.insertText(prompt);
              await sleep(500);
              await page.keyboard.press('Enter');

              const deadline = Date.now() + 90000;
              let finalResponseText = '';
              let lastSeenText = '';
              let stableCount = 0;

              while (Date.now() < deadline) {
                await sleep(1500);
                
                const latestText = await page.evaluate(() => {
                  const selectors = ['div[id^="model-response-message-content"]', 'message-content', 'div.message-content'];
                  const allMatching = [];
                  for (const sel of selectors) { document.querySelectorAll(sel).forEach(el => allMatching.push(el)); }
                  if (allMatching.length === 0) return '';
                  allMatching.sort((a, b) => (a.compareDocumentPosition(b) & 4) ? -1 : 1);
                  const lastEl = allMatching[allMatching.length - 1];
                  return lastEl ? (lastEl.innerText || lastEl.textContent || '').trim() : '';
                }).catch(() => '');

                if (!latestText) continue;

                if (latestText === lastSeenText) {
                  stableCount++;
                  const isFinished = await page.evaluate(() => {
                    const el = document.querySelector('message-content, div[id^="model-response-message-content"]');
                    return el ? (!el.innerHTML.includes('loading') && !el.innerHTML.includes('...')) : true;
                  }).catch(() => true);

                  if (stableCount >= 2 && isFinished) {
                    finalResponseText = latestText;
                    break;
                  }
                } else {
                  lastSeenText = latestText;
                  stableCount = 0;
                }
              }

              res.json({ success: true, response: finalResponseText || lastSeenText });

            } catch (err) {
              res.status(500).json({ success: false, error: err.message });
            } finally {
              if (localImagePath && fs.existsSync(localImagePath)) fs.unlinkSync(localImagePath);
            }
          });

          app.listen(PORT, '127.0.0.1', async () => {
            await initGemini();
            console.log(`🤖 Local API Server running on http://127.0.0.1:${PORT}`);
          });
          SERVER_EOF

          echo "📥 Installing ngrok via Official Ubuntu Keyring..."
          # উবুন্টু ২৪.০৪ এর জন্য ডিরেক্টরি সেফ অফিশিয়াল ইনস্টলেশন
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
          echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com noble main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y

          echo "⚡ Configuring ngrok Token..."
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

          echo "🌐 Starting ngrok Tunnel on Port 3000..."
          ngrok http 127.0.0.1:3000 --log=stdout > ngrok.log &
          
          sleep 5
          echo "=============================================="
          echo "🔗 YOUR NGROK PUBLIC TUNNEL URL: 🔗"
          curl -s http://127.0.0.1:4040/api/tunnels | json_pp | grep public_url
          echo "=============================================="

          node api_server.mjs
