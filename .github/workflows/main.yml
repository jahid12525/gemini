- name: 🛠️ Create & Start API Gateway Server
        run: |
          mkdir -p /tmp/gemini-recordings

          cat > server.mjs << 'SERVER_EOF'
          import express from 'express';
          import multer from 'multer';
          import { chromium } from 'playwright-extra';
          import StealthPlugin from 'puppeteer-extra-plugin-stealth';
          import fs from 'fs';
          import os from 'os';

          chromium.use(StealthPlugin());
          const app = express();
          const upload = multer({ dest: os.tmpdir() });
          app.use(express.json());

          const PORT = 8080;
          let context, page;

          async function initGemini() {
            try {
              console.log("⚡ [CONSOLE UPDATE] Launching Local Google Chrome Instance...");
              context = await chromium.launchPersistentContext('./gemini_profile', {
                headless: false,
                channel: 'chrome',
                args: [
                  '--no-sandbox', 
                  '--disable-setuid-sandbox',
                  '--disable-blink-features=AutomationControlled',
                  '--disable-web-security',
                  '--disable-gpu'
                ],
                viewport: { width: 1280, height: 800 },
                recordVideo: {
                  dir: '/tmp/gemini-recordings/',
                  size: { width: 1280, height: 800 }
                }
              });

              page = await context.newPage();
              
              console.log("⚡ [CONSOLE UPDATE] Navigating to https://gemini.google.com/app...");
              await page.goto('https://gemini.google.com/app', { waitUntil: 'domcontentloaded' });
              
              const currentUrl = page.url();
              console.log(`📡 [CONSOLE UPDATE] Current Active Browser URL: ${currentUrl}`);
              
              if(currentUrl.includes('accounts.google.com')) {
                console.error("❌ [SECURITY ALERT] Google rejected persistent context!");
                await page.screenshot({ path: '/tmp/gemini-recordings/auth_failed_screenshot.png' });
              } else {
                console.log("✅ [CONSOLE UPDATE] Gemini Persistent Browser Stack Ready & Verified!");
                await page.screenshot({ path: '/tmp/gemini-recordings/auth_success_screenshot.png' });
              }
              
            } catch (err) {
              console.error("❌ [CRITICAL ERROR] Failed to initialize Gemini Browser:", err.message);
            }
          }

          app.post('/api/gemini', upload.single('image'), async (req, res) => {
            if (!page) return res.status(500).json({ success: false, error: 'Browser stack not ready' });
            
            const promptText = req.body.prompt;
            const file = req.file;

            if (!promptText) return res.status(400).json({ error: 'Prompt is required' });

            try {
              console.log(`🤖 [API] Request Received: ${promptText}`);
              
              await page.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded' });
              try { await page.keyboard.press('Escape'); } catch(_) {}

              // ইমেজ থাকলে শুধুমাত্র এখানে সেফটি বাফার কাজ করবে যেন ৪MD বা বড় ইমেজ ড্রপ না হয়
              if (file) {
                console.log(`📎 [API] Attaching Image Asset to Gemini...`);
                const inputFiles = await page.waitForSelector('input[type="file"]', { timeout: 10000 });
                await inputFiles.setInputFiles(file.path);
                // জেমিনি ইন্টারফেসে ইমেজটি আপলোড হয়ে স্ট্যাবল হওয়ার জন্য ৩ সেকেন্ডের রিয়েল সেফটি ওয়েট
                await new Promise(r => setTimeout(r, 3000));
                fs.unlinkSync(file.path);
              }

              const inputSel = 'div.ql-editor[contenteditable="true"], div[role="textbox"], textarea';
              await page.waitForSelector(inputSel, { timeout: 10000 });
              await page.click(inputSel, { force: true });
              await page.keyboard.insertText(promptText);
              await page.keyboard.press('Enter');
              console.log(`📡 [API] Prompt submitted. Scraping response chunks...`);

              let responseText = '';
              let lastLength = 0;
              let checkCount = 0;
              
              // ইমেজ প্রসেসিংয়ের জন্য এই লুপে ১.৫ সেকেন্ডের বদলে ২.৫ সেকেন্ড ইন্টারভাল দেওয়া হলো
              while (true) {
                await new Promise(r => setTimeout(r, 2500)); 
                
                responseText = await page.evaluate(() => {
                  const el = document.querySelector('div[id^="model-response-message-content"], message-content, .message-content-inner');
                  return el ? el.innerText.trim() : '';
                });

                if (responseText.length > 0 && responseText.length === lastLength) {
                  checkCount++;
                  if (checkCount >= 2) break; // রেসপন্স কমপ্লিট ও স্ট্যাবল হলে ব্রেক
                } else {
                  checkCount = 0;
                  if (responseText.length > 0) {
                     lastLength = responseText.length;
                  }
                }
              }

              console.log(`✅ [API] Generation Complete! Returning payload.`);
              res.json({ success: true, response: responseText });
            } catch (err) {
              console.error(`❌ [API ERROR]`, err.message);
              res.status(500).json({ success: false, error: err.message });
            }
          });

          app.listen(PORT, '0.0.0.0', async () => {
            console.log(`🚀 API Internal Server running on port ${PORT}`);
            await initGemini();
          });
          SERVER_EOF

          node server.mjs &
          sleep 5
